<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bench</title>
    <script>
      (function() {
        try {
          var lang = localStorage.getItem("language");
          if (lang) {
            document.documentElement.lang = lang;
          }
          var theme = localStorage.getItem("theme");
          if (theme === "dark" || (theme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch(e) {}
      })();
    </script>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent;
      }

      body {
        --brand: #5b5cf6;
        --brand-strong: #3737e8;
        --cyan: #16c7df;
        --mint: #2ac979;
        --ring: rgba(91, 92, 246, 0.48);
        --ring-soft: rgba(22, 199, 223, 0.3);
        --panel-shadow: rgba(63, 63, 241, 0.26);
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      html.dark body {
        --brand: #818cf8;
        --brand-strong: #6366f1;
        --cyan: #22d3ee;
        --mint: #34d399;
        --ring: rgba(129, 140, 248, 0.52);
        --ring-soft: rgba(34, 211, 238, 0.34);
        --panel-shadow: rgba(99, 102, 241, 0.34);
      }

      .splash {
        position: relative;
        display: grid;
        width: min(100vw, 100vh);
        aspect-ratio: 1;
        place-items: center;
        overflow: hidden;
        border-radius: 9999px;
        isolation: isolate;
      }

      .panel {
        position: absolute;
        inset: 1px;
        z-index: 0;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.36);
        border-radius: 9999px;
        opacity: 0;
        background:
          radial-gradient(circle at 30% 18%, rgba(255, 255, 255, 0.72), transparent 28%),
          linear-gradient(135deg, rgba(22, 199, 223, 0.94), rgba(91, 92, 246, 0.98) 48%, rgba(42, 201, 121, 0.9));
        box-shadow:
          0 0 56px rgba(22, 199, 223, 0.28),
          0 26px 80px var(--panel-shadow);
        transform: scale(0.68);
        will-change: border-radius, opacity, transform;
      }

      .panel::before,
      .panel::after {
        position: absolute;
        inset: 0;
        content: "";
      }

      .panel::before {
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px),
          linear-gradient(0deg, rgba(255, 255, 255, 0.12) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, #000 0 62%, transparent 82%);
        opacity: 0.46;
      }

      .panel::after {
        border: 1px solid rgba(255, 255, 255, 0.28);
        border-radius: inherit;
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.16),
          inset 0 0 48px rgba(255, 255, 255, 0.12);
      }

      .stage {
        position: relative;
        z-index: 2;
        display: grid;
        width: min(74vw, 132px);
        aspect-ratio: 1;
        place-items: center;
        filter: drop-shadow(0 18px 36px var(--panel-shadow));
        will-change: transform, opacity;
      }

      .orbit {
        position: absolute;
        inset: 0;
        border: 1.5px solid var(--ring-soft);
        border-top-color: var(--cyan);
        border-right-color: var(--ring);
        border-radius: 9999px;
        opacity: 0.96;
        rotate: 0deg;
        scale: 1;
        animation: spin 1.45s linear infinite;
        will-change: rotate, scale, border-radius, opacity;
      }

      .orbit::after {
        position: absolute;
        top: 8%;
        right: 12%;
        width: 9px;
        height: 9px;
        border-radius: 9999px;
        background: var(--cyan);
        box-shadow: 0 0 18px var(--cyan);
        content: "";
      }

      .orbit.inner {
        inset: 11%;
        border-top-color: var(--mint);
        border-left-color: var(--ring);
        animation-duration: 2.1s;
        animation-direction: reverse;
        opacity: 0.76;
      }

      .icon {
        position: relative;
        display: grid;
        width: 67%;
        aspect-ratio: 1;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 50%;
        background:
          radial-gradient(circle at 32% 24%, rgba(255, 255, 255, 0.42), transparent 34%),
          linear-gradient(135deg, var(--brand), var(--brand-strong) 54%, #2024b8);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.38),
          0 16px 36px rgba(63, 63, 241, 0.34);
        animation: breathe 1.85s ease-in-out infinite;
        will-change: transform, border-radius, opacity;
      }

      .letter {
        color: #ffffff;
        font-size: 40px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1;
        user-select: none;
      }

      .shard {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 26%;
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.72), transparent 34%),
          linear-gradient(135deg, var(--cyan), var(--brand));
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.24);
        will-change: transform, border-radius, opacity;
      }

      .shard:nth-child(1) {
        --x: -1;
        --y: -1;
      }

      .shard:nth-child(2) {
        --x: 1;
        --y: -1;
        animation-delay: 45ms;
      }

      .shard:nth-child(3) {
        --x: -1;
        --y: 1;
        animation-delay: 75ms;
      }

      .shard:nth-child(4) {
        --x: 1;
        --y: 1;
        animation-delay: 105ms;
      }

      body.run .panel {
        animation: panel-expand 2.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.run .stage {
        animation: stage-release 1.68s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.run .icon {
        animation: icon-morph 1.46s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.run .orbit {
        animation:
          spin 0.85s linear infinite,
          orbit-release 1.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.run .orbit.inner {
        animation:
          spin 0.95s linear infinite reverse,
          orbit-release-inner 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.run .shard {
        animation-name: shard-release;
        animation-duration: 1.56s;
        animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1);
        animation-fill-mode: forwards;
      }

      body.done {
        opacity: 0;
        transition: opacity 220ms ease;
      }

      @keyframes spin {
        to {
          rotate: 360deg;
        }
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.055);
        }
      }

      @keyframes panel-expand {
        0% {
          border-radius: 9999px;
          opacity: 0;
          transform: scale(0.68);
        }
        18% {
          border-radius: 9999px;
          opacity: 0.88;
          transform: scale(0.98);
        }
        54% {
          border-radius: 36px;
          opacity: 0.96;
          transform: scale(1.08);
        }
        82% {
          border-radius: 22px;
          opacity: 0.92;
          transform: scale(1.16);
        }
        100% {
          border-radius: 18px;
          opacity: 0;
          transform: scale(1.24);
        }
      }

      @keyframes stage-release {
        0% {
          opacity: 1;
          transform: scale(1);
        }
        42% {
          opacity: 0.94;
          transform: scale(1.06);
        }
        100% {
          opacity: 0;
          transform: scale(1.72);
        }
      }

      @keyframes icon-morph {
        0% {
          border-radius: 50%;
          opacity: 1;
          transform: scale(1);
        }
        42% {
          border-radius: 26%;
          opacity: 0.92;
          transform: scale(1.12);
        }
        100% {
          border-radius: 14%;
          opacity: 0;
          transform: scale(5.2);
        }
      }

      @keyframes orbit-release {
        0% {
          border-radius: 9999px;
          opacity: 0.95;
          scale: 1;
        }
        52% {
          border-radius: 32%;
          opacity: 0.62;
          scale: 2.9;
        }
        100% {
          border-radius: 14%;
          opacity: 0;
          scale: 7.8;
        }
      }

      @keyframes orbit-release-inner {
        0% {
          border-radius: 9999px;
          opacity: 0.76;
          scale: 1;
        }
        52% {
          border-radius: 28%;
          opacity: 0.48;
          scale: 2.3;
        }
        100% {
          border-radius: 12%;
          opacity: 0;
          scale: 6.6;
        }
      }

      @keyframes shard-release {
        0% {
          border-radius: 50%;
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.24);
        }
        18% {
          opacity: 0.92;
        }
        58% {
          border-radius: 24%;
          opacity: 0.7;
          transform:
            translate(
              calc(-50% + var(--x) * 86px),
              calc(-50% + var(--y) * 68px)
            )
            scale(1.1);
        }
        100% {
          border-radius: 12%;
          opacity: 0;
          transform:
            translate(
              calc(-50% + var(--x) * 122px),
              calc(-50% + var(--y) * 106px)
            )
            scale(0.42);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .icon,
        .orbit,
        body.run .panel,
        body.run .stage,
        body.run .icon,
        body.run .orbit,
        body.run .orbit.inner,
        body.run .shard {
          animation: none;
        }

        .panel,
        .stage {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="splash" aria-hidden="true">
      <div class="panel"></div>
      <div class="stage">
        <div class="orbit"></div>
        <div class="orbit inner"></div>
        <div class="icon">
          <span class="letter">B</span>
        </div>
        <div class="shards">
          <span class="shard"></span>
          <span class="shard"></span>
          <span class="shard"></span>
          <span class="shard"></span>
        </div>
      </div>
    </main>
    <script type="module" src="/src/splash.ts"></script>
  </body>
</html>
