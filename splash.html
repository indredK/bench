<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bench OS - Core Initialization</title>
    <script>
      (function () {
        try {
          var lang = localStorage.getItem("language");
          if (lang) { document.documentElement.lang = lang; }
          var theme = localStorage.getItem("theme");
          if (theme === "dark" || (theme !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <style>
      :root {
        --neon-cyan: #00f0ff;
        --neon-purple: #bd00ff;
        --matrix-glow: rgba(0, 240, 255, 0.35);
        --panel-bg: rgba(6, 10, 26, 0.88);
        --text-pure: #ffffff;
        --grid-line: rgba(0, 240, 255, 0.08);
        --focus-shift-y: -32px;
        --ring-size: clamp(320px, 34vmin, 420px);
        --wave-size: clamp(176px, 18vmin, 260px);
      }
      
      html.dark {
        --neon-cyan: #00f0ff;
        --neon-purple: #7000ff;
        --matrix-glow: rgba(112, 0, 255, 0.4);
        --panel-bg: rgba(3, 7, 18, 0.92);
        --grid-line: rgba(112, 0, 255, 0.1);
      }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: transparent; /* 允许客户端软件窗口透明 border-radius */
        position: relative;
        font-family: "Courier New", Courier, monospace;
      }

      /* 核心科技感背景：空间矩阵 */
      .matrix-space {
        position: absolute;
        inset: 0;
        background: var(--panel-bg);
        background-image: 
          linear-gradient(var(--grid-line) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
        background-size: 24px 24px;
        background-position: center;
        mask-image: radial-gradient(circle at center, #000 40%, transparent 85%);
        z-index: 1;
        overflow: hidden;
      }

      /* 粒子光束穿梭 */
      .matrix-space::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 100%;
        top: 0; left: -50%;
        background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.15), transparent);
        transform: skewX(-45deg) translateX(-100%);
        animation: beam-pass 2.5s cubic-bezier(0.3, 0.8, 0.7, 1) infinite;
      }

      .splash-container {
        position: relative;
        width: 100%;
        height: 100%;
        z-index: 2;
        perspective: 1600px;
        isolation: isolate;
      }

      .frame-outline {
        position: absolute;
        inset: clamp(16px, 2.4vw, 28px);
        border: 1px solid rgba(0, 240, 255, 0.14);
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(0, 240, 255, 0.06), transparent 18%),
          linear-gradient(0deg, rgba(189, 0, 255, 0.05), transparent 18%);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.02),
          0 0 80px rgba(0, 240, 255, 0.08);
        opacity: 0;
        transform: scale(0.96);
      }

      /* 外围 HUD 矢量圆环（带缺口刻度） */
      .ring-orbit {
        position: absolute;
        top: calc(50% + var(--focus-shift-y));
        left: 50%;
        width: var(--ring-size);
        height: var(--ring-size);
        transform: translate(-50%, -50%) scale(0.82);
        opacity: 0;
      }

      .hud-vector-ring {
        position: absolute;
        inset: 0;
        border: 2px solid var(--neon-cyan);
        border-radius: 50%;
        mask-image: conic-gradient(from 0deg, #000 0deg, #000 120deg, transparent 140deg, #000 180deg, transparent 240deg, #000 280deg);
        box-shadow: 0 0 25px var(--matrix-glow);
      }

      .hud-vector-ring::after {
        content: '';
        position: absolute;
        inset: 12px;
        border: 1px dashed var(--neon-purple);
        border-radius: 50%;
        opacity: 0.8;
      }

      /* 能量核：硬核棱镜设计 */
      .core-prism {
        position: absolute;
        top: calc(50% + var(--focus-shift-y));
        left: 50%;
        width: 110px;
        height: 110px;
        background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(124, 58, 237, 0.15));
        border: 2px solid var(--neon-cyan);
        box-shadow: 
          0 0 50px var(--matrix-glow),
          inset 0 0 25px var(--matrix-glow);
        transform: translate(-50%, -50%) rotate(45deg) scale(0.76);
        display: grid;
        place-items: center;
        opacity: 0;
        z-index: 5;
      }

      .letter-b-box {
        transform: translateY(-1px) rotate(-45deg); /* 反向矫正字符 */
        display: grid;
        place-items: center;
      }

      /* 炫酷：赛博朋克超频 Glitch 字母 B */
      .letter-b {
        font-size: 72px;
        font-weight: 900;
        color: var(--text-pure);
        position: relative;
        user-select: none;
        text-shadow: 
          -2px -2px 0 var(--neon-cyan),
          2px 2px 0 var(--neon-purple),
          0 0 20px rgba(255, 255, 255, 0.6);
        animation: glitch-trigger 3.5s 1s infinite;
      }

      /* 全息准星角标 */
      .hologram-bracket {
        position: absolute;
        width: 24px;
        height: 24px;
        border: 2px solid var(--neon-cyan);
        opacity: 0;
      }
      .corner-tl { top: clamp(26px, 4vh, 44px); left: clamp(26px, 4vw, 44px); border-right: none; border-bottom: none; --burst-x: -26px; --burst-y: -26px; }
      .corner-tr { top: clamp(26px, 4vh, 44px); right: clamp(26px, 4vw, 44px); border-left: none; border-bottom: none; --burst-x: 26px; --burst-y: -26px; }
      .corner-bl { bottom: clamp(26px, 4vh, 44px); left: clamp(26px, 4vw, 44px); border-right: none; border-top: none; --burst-x: -26px; --burst-y: 26px; }
      .corner-br { bottom: clamp(26px, 4vh, 44px); right: clamp(26px, 4vw, 44px); border-left: none; border-top: none; --burst-x: 26px; --burst-y: 26px; }

      /* 环形刻度线装饰 */
      .hologram-bracket::before {
        content: '';
        position: absolute;
        width: 4px;
        height: 4px;
        background: var(--neon-purple);
        box-shadow: 0 0 8px var(--neon-purple);
      }
      .corner-tl::before { right: -3px; top: -3px; }
      .corner-tr::before { left: -3px; top: -3px; }
      .corner-bl::before { right: -3px; bottom: -3px; }
      .corner-br::before { left: -3px; bottom: -3px; }

      /* 极光激光雷达扫描 */
      .radar-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--text-pure), var(--neon-cyan), transparent);
        box-shadow: 0 0 20px var(--neon-cyan);
        top: calc(50% + var(--focus-shift-y));
        transform: translateY(-126px);
        opacity: 0;
        pointer-events: none;
      }

      .shockwave {
        position: absolute;
        top: calc(50% + var(--focus-shift-y));
        left: 50%;
        width: var(--wave-size);
        height: var(--wave-size);
        border: 2px solid rgba(0, 240, 255, 0.72);
        border-radius: 50%;
        box-shadow:
          0 0 40px rgba(0, 240, 255, 0.26),
          inset 0 0 24px rgba(0, 240, 255, 0.12);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.35);
        pointer-events: none;
      }

      .wave-b {
        border-color: rgba(189, 0, 255, 0.62);
        box-shadow:
          0 0 44px rgba(112, 0, 255, 0.28),
          inset 0 0 26px rgba(112, 0, 255, 0.12);
      }

      /* 实时加载控制台日志 */
      .console-log {
        position: absolute;
        inset-inline: 0;
        bottom: clamp(30px, 5vh, 48px);
        display: grid;
        place-items: center;
        gap: 8px;
        padding-inline: clamp(24px, 4vw, 48px);
        opacity: 0;
        text-align: center;
      }

      .codename-glyphs {
        display: inline-grid;
        grid-auto-flow: column;
        gap: 0.34em;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.28em;
        color: var(--text-pure);
        text-transform: uppercase;
        text-shadow: 0 0 10px rgba(0, 240, 255, 0.22);
      }

      .codename-glyphs span {
        min-width: 1ch;
        text-align: center;
      }

      .codename-bar {
        width: 188px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.3), var(--neon-cyan), rgba(189, 0, 255, 0.54), transparent);
        box-shadow: 0 0 14px rgba(0, 240, 255, 0.3);
        transform: scaleX(0);
        transform-origin: center;
      }

      .codename-status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 9px;
        letter-spacing: 0.28em;
        color: rgba(255, 255, 255, 0.74);
        text-transform: uppercase;
        opacity: 0;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--neon-cyan);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.72);
        animation: dot-pulse 1.8s ease-in-out infinite;
      }

      /* ==================== 软件启动激发态 (body.run) ==================== */
      body.run .frame-outline {
        animation: frame-deploy 0.78s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.run .ring-orbit {
        animation: ring-deploy 0.92s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.run .hud-vector-ring {
        animation: rotate-clock 12s linear 0.92s infinite;
      }

      body.run .hud-vector-ring::after {
        animation:
          ring-inner-fade 0.92s cubic-bezier(0.16, 1, 0.3, 1) forwards,
          rotate-counter 6s linear 0.92s infinite;
      }

      body.run .core-prism {
        animation:
          prism-settle 0.82s cubic-bezier(0.16, 1, 0.3, 1) forwards,
          core-pulse 3.4s ease-in-out 0.82s infinite;
      }

      body.run .hologram-bracket {
        animation: bracket-deploy 0.58s cubic-bezier(0.16, 1, 0.3, 1) 0.18s forwards;
      }

      body.run .radar-line {
        animation: radar-sweep 2.3s cubic-bezier(0.4, 0, 0.2, 1) 0.74s infinite;
      }

      /* ==================== 启动完成离场态 (body.done) ==================== */
      body.done .core-prism {
        animation: prism-expand-out 0.74s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      body.done .frame-outline {
        animation: frame-release 0.52s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      body.done .ring-orbit {
        animation: ring-blast 0.68s cubic-bezier(0.11, 0, 0.5, 0) forwards;
      }

      body.done .hologram-bracket {
        animation: bracket-release 0.56s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      body.done .console-log {
        animation: console-release 0.28s ease-out forwards;
      }

      body.done .shockwave.wave-a {
        animation: shockwave-expand 0.72s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      body.done .shockwave.wave-b {
        animation: shockwave-expand 0.72s cubic-bezier(0.16, 1, 0.3, 1) 0.08s forwards;
      }

      body.done .radar-line {
        animation: radar-release 0.22s ease-out forwards;
      }

      body.done .matrix-space {
        animation: space-dissolve 0.8s ease-in forwards;
      }

      body.done .splash-container {
        animation: stage-bloom 0.72s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      body.done .status-dot {
        opacity: 0;
      }

      /* 核心动画集 */
      @keyframes beam-pass {
        0% { transform: skewX(-45deg) translateX(-100%); }
        100% { transform: skewX(-45deg) translateX(100%); }
      }

      @keyframes ring-deploy {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.68); filter: blur(10px); }
        68% { opacity: 0.74; transform: translate(-50%, -50%) scale(1.04); filter: blur(0); }
        100% { opacity: 0.62; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
      }

      @keyframes frame-deploy {
        0% { opacity: 0; transform: scale(0.96); filter: blur(8px); }
        100% { opacity: 1; transform: scale(1); filter: blur(0); }
      }

      @keyframes ring-inner-fade {
        0% { opacity: 0; }
        100% { opacity: 0.8; }
      }

      @keyframes rotate-clock {
        to { transform: rotate(360deg); }
      }

      @keyframes rotate-counter {
        to { transform: rotate(-360deg); }
      }

      @keyframes prism-settle {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) rotate(18deg) scale(0.38);
          filter: blur(10px);
        }
        60% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(45deg) scale(1.06);
          filter: blur(0);
        }
        100% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(45deg) scale(1);
          filter: blur(0);
        }
      }

      @keyframes core-pulse {
        0%, 100% {
          box-shadow:
            0 0 50px var(--matrix-glow),
            inset 0 0 25px var(--matrix-glow);
        }
        50% {
          box-shadow:
            0 0 72px rgba(0, 240, 255, 0.42),
            0 0 100px rgba(189, 0, 255, 0.16),
            inset 0 0 34px rgba(0, 240, 255, 0.28);
        }
      }

      @keyframes bracket-deploy {
        0% { opacity: 0; transform: scale(0.45); filter: blur(5px); }
        100% { opacity: 0.82; transform: scale(1); filter: blur(0); }
      }

      @keyframes radar-sweep {
        0% { transform: translateY(-126px); opacity: 0; }
        14%, 82% { opacity: 1; }
        100% { transform: translateY(126px); opacity: 0; }
      }

      @keyframes glitch-trigger {
        0%, 94%, 100% { text-shadow: -2px -2px 0 var(--neon-cyan), 2px 2px 0 var(--neon-purple); transform: scale(1) skewX(0); }
        95% { text-shadow: 4px -2px 0 var(--neon-cyan), -4px 3px 0 var(--neon-purple); transform: scale(1.08) skewX(-10deg); color: #00f0ff;}
        97% { text-shadow: -3px 4px 0 var(--neon-cyan), 3px -2px 0 var(--neon-purple); transform: scale(0.92) skewX(10deg); color: #ff00ff;}
        99% { text-shadow: 1px -3px 0 var(--neon-cyan), -2px 2px 0 var(--neon-purple); transform: scale(1.03) skewX(0); }
      }

      @keyframes prism-expand-out {
        0% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(45deg) scale(1);
          border-radius: 10px;
          filter: blur(0);
        }
        32% {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(45deg) scale(0.72);
          border-radius: 12px;
          background: rgba(189, 0, 255, 0.22);
          box-shadow:
            0 0 96px rgba(189, 0, 255, 0.38),
            inset 0 0 28px rgba(0, 240, 255, 0.22);
        }
        100% {
          opacity: 0;
          transform: translate(-50%, -50%) rotate(135deg) scale(4.4);
          border-radius: 50%;
          filter: blur(12px);
        }
      }

      @keyframes ring-blast {
        0% { transform: translate(-50%, -50%) scale(1); opacity: 0.62; filter: blur(0); }
        100% { transform: translate(-50%, -50%) scale(3.15); opacity: 0; filter: blur(10px); }
      }

      @keyframes shockwave-expand {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.42); }
        24% { opacity: 0.68; }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(3.35); }
      }

      @keyframes bracket-release {
        0% { opacity: 0.82; transform: translate(0, 0) scale(1); filter: blur(0); }
        100% {
          opacity: 0;
          transform: translate(var(--burst-x), var(--burst-y)) scale(1.75);
          filter: blur(2px);
        }
      }

      @keyframes console-release {
        0% { opacity: 0.92; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(8px); }
      }

      @keyframes radar-release {
        0% { opacity: 1; }
        100% { opacity: 0; }
      }

      @keyframes space-dissolve {
        0% { opacity: 1; }
        100% { opacity: 0; transform: scale(1.05); filter: blur(4px); }
      }

      @keyframes stage-bloom {
        0% { transform: scale(1); }
        100% { transform: scale(1.05); }
      }

      @keyframes frame-release {
        0% { opacity: 1; transform: scale(1); }
        100% { opacity: 0; transform: scale(1.05); }
      }

      @keyframes dot-pulse {
        0%, 100% { opacity: 0.5; transform: scale(0.92); }
        50% { opacity: 1; transform: scale(1.12); }
      }

      @media (prefers-reduced-motion: reduce) {
        .matrix-space::before, .hud-vector-ring, .hud-vector-ring::after, .letter-b, .radar-line, .status-dot {
          animation: none !important;
        }

        .frame-outline,
        .ring-orbit {
          opacity: 0.62;
        }

        .ring-orbit { transform: translate(-50%, -50%) scale(1); }

        .core-prism {
          opacity: 1;
          transform: translate(-50%, -50%) rotate(45deg) scale(1);
        }

        .hologram-bracket {
          opacity: 0.82;
        }

        .console-log {
          opacity: 0.92;
          transform: none;
        }

        body.done .splash-container {
          opacity: 0;
          transition: opacity 0.18s ease;
        }
      }
    </style>
  </head>
  <body>
    <div class="matrix-space" aria-hidden="true"></div>

    <main class="splash-container" aria-hidden="true">
      <div class="frame-outline"></div>
      <div class="hologram-bracket corner-tl"></div>
      <div class="hologram-bracket corner-tr"></div>
      <div class="hologram-bracket corner-bl"></div>
      <div class="hologram-bracket corner-br"></div>

      <div class="radar-line"></div>
      <div class="shockwave wave-a"></div>
      <div class="shockwave wave-b"></div>

      <div class="ring-orbit">
        <div class="hud-vector-ring"></div>
      </div>

      <div class="core-prism">
        <div class="letter-b-box">
          <span class="letter-b">B</span>
        </div>
      </div>

      <div class="console-log codename">
        <div class="codename-glyphs" aria-label="BENCH-OS">
          <span>B</span>
          <span>E</span>
          <span>N</span>
          <span>C</span>
          <span>H</span>
          <span>-</span>
          <span>O</span>
          <span>S</span>
        </div>
        <div class="codename-bar"></div>
        <div class="codename-status">
          <span class="status-dot" aria-hidden="true"></span>
          <span>core initialization sequence</span>
        </div>
      </div>
    </main>

    <script type="module" src="/src/splash.ts"></script>
  </body>
</html>
