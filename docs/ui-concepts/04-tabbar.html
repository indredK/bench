<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bench · 方案4 底部标签栏</title>
<style>
  :root{
    --bg:#0b0e14; --card:#141925; --line:rgba(255,255,255,.08);
    --txt:#e7eaf0; --dim:#8b93a7; --accent:#7c5cff; --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--txt);display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .bar{height:56px;flex:none;display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--line)}
  .bar .title{font-weight:800;font-size:18px}
  .bar .en{color:var(--dim);font-size:12px}
  .bar .spacer{flex:1}
  .bar .search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px}
  .bar .search input{border:0;outline:0;background:transparent;color:var(--txt);font-size:13px;width:180px}
  .bar .ib{font-size:17px;cursor:pointer;opacity:.8}
  .main{flex:1;overflow:auto;padding:24px 22px 110px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;max-width:980px;margin:0 auto}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .tile:hover{transform:translateY(-3px);border-color:var(--accent)}
  .tile .e{font-size:26px;margin-bottom:12px}
  .tile .n{font-weight:700;font-size:15px}
  .tile .d{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.5}
  .tile .badge{position:absolute;top:14px;right:14px;font-size:11px;color:#22d3ee;border:1px solid rgba(34,211,238,.35);border-radius:999px;padding:1px 8px}
  .empty{text-align:center;color:var(--dim);margin-top:40px;font-size:14px}
  /* ---- Bottom tab bar (dock) ---- */
  .dock{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:6px;
    background:rgba(20,25,37,.86);border:1px solid var(--line);border-radius:18px;padding:8px;
    backdrop-filter:blur(20px);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:78px;padding:8px 10px;border-radius:13px;cursor:pointer;color:var(--dim);font-size:11.5px;transition:.15s}
  .tab .ic{font-size:20px}
  .tab:hover{color:var(--txt);background:rgba(255,255,255,.05)}
  .tab.active{color:#fff;background:linear-gradient(135deg,var(--accent),#22d3ee)}
  .tab.active .ic{transform:scale(1.08)}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c2330;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;transition:.25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="bar">
  <div><div class="title" id="ttl">启动</div><div class="en" id="ten">Launch & Quick</div></div>
  <div class="spacer"></div>
  <div class="search">⌕<input placeholder="搜索…" /></div>
  <span class="ib">🌗</span><span class="ib">⬆</span>
</div>

<div class="main"><div class="grid" id="grid"></div></div>

<div class="dock" id="dock"></div>
<div class="toast" id="toast"></div>

<script>
const TABS = [
  {id:"launch", ic:"🚀", n:"启动", en:"Launch & Quick", items:[
    {n:"快速启动", e:"🚀", d:"拖拽分类启动器，支持固定与极速打开"},
    {n:"主题切换", e:"🎨", d:"浅色 / 深色 / 跟随系统"},
    {n:"账号管理", e:"👤", d:"多站点账号会话与加密存储", badge:"5"},
  ]},
  {id:"dev", ic:"🛠", n:"工具箱", en:"Dev Toolbox", items:[
    {n:"端口管理", e:"🔌", d:"端口扫描、释放进程、远程与占用告警", badge:"2"},
    {n:"垃圾清理", e:"🧹", d:"扫描并批量清理构建产物"},
    {n:"环境检测", e:"🔍", d:"检测已安装的开发工具与运行环境"},
    {n:"Token 计算", e:"🧮", d:"计费标准、模型对比与成本计算"},
    {n:"开发工具", e:"🛠", d:"JSON / Base64 / 哈希 / UUID / 时间戳"},
    {n:"网络诊断", e:"📡", d:"Ping、本机 IP、WiFi 信息"},
    {n:"系统信息", e:"🖥", d:"原生硬件与系统详情"},
  ]},
  {id:"sys", ic:"⚙️", n:"系统", en:"System", items:[
    {n:"系统设置", e:"⚙️", d:"外观 / 安全 / 系统 / 高级 控制中心"},
    {n:"硬件查询", e:"💻", d:"查询与对比不同设备硬件规格"},
    {n:"应用管理", e:"📦", d:"跨平台应用发现、升级与卸载", badge:"12"},
  ]},
  {id:"data", ic:"📚", n:"资料", en:"Data", items:[
    {n:"术语库", e:"📖", d:"按行业 / 分类管理术语与关联站点"},
    {n:"账号管理", e:"👤", d:"多站点账号会话、加密存储", badge:"5"},
  ]},
  {id:"more", ic:"⋯", n:"更多", en:"More", items:[
    {n:"自动更新", e:"⬆", d:"应用内更新，签名校验与进度跟踪"},
    {n:"菜单栏托盘", e:"🟦", d:"显示窗口 / 防睡眠 / 开机启动 / 退出"},
    {n:"国际化", e:"🌐", d:"中英文双语，即时切换"},
  ]},
];

const dock=document.getElementById('dock');
const grid=document.getElementById('grid');
const ttl=document.getElementById('ttl');
const ten=document.getElementById('ten');
const toast=document.getElementById('toast');
let cur='launch';

TABS.forEach(t=>{
  const b=document.createElement('div');
  b.className='tab'+(t.id===cur?' active':'');
  b.dataset.id=t.id;
  b.innerHTML=`<span class="ic">${t.ic}</span><span>${t.n}</span>`;
  b.onclick=()=>show(t.id);
  dock.appendChild(b);
});

function show(id){
  cur=id;
  const t=TABS.find(x=>x.id===id);
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.id===id));
  ttl.textContent=t.n; ten.textContent=t.en;
  grid.innerHTML='';
  t.items.forEach(it=>{
    const d=document.createElement('div');
    d.className='tile';
    d.innerHTML=`<div class="e">${it.e}</div><div class="n">${it.n}</div><div class="d">${it.d}</div>${it.badge?`<span class="badge">${it.badge}</span>`:''}`;
    d.onclick=()=>{toast.textContent='进入 → '+it.n;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100);};
    grid.appendChild(d);
  });
}
show('launch');
</script>
</body>
</html>
