<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bench · 上方标签（Top Tab）</title>
<style>
  :root{
    --bg:#0d1018; --tabbar:#121723; --card:#161c27; --line:rgba(255,255,255,.08);
    --txt:#e7eaf0; --dim:#8b93a7; --accent:#7c5cff; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg);color:var(--txt);display:flex;flex-direction:column;height:100vh;overflow:hidden}

  /* ---- Top tab bar ---- */
  .topbar{height:60px;flex:none;background:var(--tabbar);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:0;padding:0 16px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:16px;padding-right:18px;margin-right:6px;border-right:1px solid var(--line)}
  .brand .dot{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#22d3ee);display:grid;place-items:center;color:#fff;font-size:13px}
  .tabs{display:flex;gap:4px;flex:1}
  .tab{padding:9px 16px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--dim);transition:.15s;position:relative;white-space:nowrap}
  .tab:hover{color:var(--txt);background:rgba(255,255,255,.05)}
  .tab.active{color:#fff;background:rgba(124,92,255,.16)}
  .tab.active::after{content:"";position:absolute;left:16px;right:16px;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--accent),#22d3ee);border-radius:2px}
  .tab .cnt{font-size:11px;color:var(--dim);margin-left:6px;background:rgba(255,255,255,.07);border-radius:999px;padding:1px 7px}
  .topright{display:flex;align-items:center;gap:12px;padding-left:16px;margin-left:6px;border-left:1px solid var(--line)}
  .search{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:7px 11px}
  .search input{border:0;outline:0;background:transparent;color:var(--txt);font-size:13px;width:150px}
  .ib{font-size:17px;cursor:pointer;opacity:.8}
  .ib:hover{opacity:1}

  /* ---- Content ---- */
  .main{flex:1;overflow:auto;padding:26px 30px}
  .head{max-width:1040px;margin:0 auto 20px}
  .head h1{font-size:21px;display:flex;align-items:center;gap:10px}
  .head .en{color:var(--dim);font-size:13px;font-weight:500}
  .head .desc{color:var(--dim);font-size:14px;line-height:1.6;margin-top:8px;max-width:680px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;max-width:1040px;margin:0 auto}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.16s;position:relative;overflow:hidden}
  .tile:hover{transform:translateY(-3px);border-color:var(--accent)}
  .tile .e{font-size:26px;margin-bottom:12px}
  .tile .n{font-weight:700;font-size:15px}
  .tile .d{font-size:12.5px;color:var(--dim);margin-top:6px;line-height:1.55}
  .tile .badge{position:absolute;top:14px;right:14px;font-size:11px;color:#22d3ee;border:1px solid rgba(34,211,238,.35);border-radius:999px;padding:1px 8px}
  .tile .go{margin-top:12px;font-size:12px;color:var(--accent);opacity:0;transition:.16s}
  .tile:hover .go{opacity:1}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1c2330;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;transition:.25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="dot">B</span> Bench</div>
  <div class="tabs" id="tabs"></div>
  <div class="topright">
    <div class="search">⌕<input placeholder="搜索…" /></div>
    <span class="ib">🌗</span><span class="ib">⬆</span>
  </div>
</div>

<div class="main">
  <div class="head" id="head"></div>
  <div class="grid" id="grid"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const TABS = [
  {id:"launch", n:"启动", en:"Launch & Quick", desc:"常用入口与快速启动，打开即得。", items:[
    {n:"快速启动", e:"🚀", d:"拖拽分类启动器，支持固定与极速打开"},
    {n:"主题切换", e:"🎨", d:"浅色 / 深色 / 跟随系统"},
    {n:"账号管理", e:"👤", d:"多站点账号会话与加密存储", badge:"5"},
  ]},
  {id:"dev", n:"工具箱", en:"Dev Toolbox", desc:"开发全流程小工具，覆盖端口、清理、环境、成本与诊断。", items:[
    {n:"端口管理", e:"🔌", d:"端口扫描、释放进程、远程与占用告警", badge:"2"},
    {n:"垃圾清理", e:"🧹", d:"扫描并批量清理构建产物"},
    {n:"环境检测", e:"🔍", d:"检测已安装的开发工具与运行环境"},
    {n:"Token 计算", e:"🧮", d:"计费标准、模型对比与成本计算"},
    {n:"开发工具", e:"🛠", d:"JSON / Base64 / 哈希 / UUID / 时间戳"},
    {n:"网络诊断", e:"📡", d:"Ping、本机 IP、WiFi 信息"},
    {n:"系统信息", e:"🖥", d:"原生硬件与系统详情"},
  ]},
  {id:"sys", n:"系统", en:"System", desc:"系统设置、硬件与应用的一站式管理。", items:[
    {n:"系统设置", e:"⚙️", d:"外观 / 安全 / 系统 / 高级 控制中心"},
    {n:"硬件查询", e:"💻", d:"查询与对比不同设备硬件规格"},
    {n:"应用管理", e:"📦", d:"跨平台应用发现、升级与卸载", badge:"12"},
  ]},
  {id:"data", n:"资料", en:"Data", desc:"账号与术语等知识型资料的归集。", items:[
    {n:"术语库", e:"📖", d:"按行业 / 分类管理术语与关联站点"},
    {n:"账号管理", e:"👤", d:"多站点账号会话、加密存储", badge:"5"},
  ]},
  {id:"more", n:"更多", en:"More", desc:"更新、托盘与国际化等全局能力。", items:[
    {n:"自动更新", e:"⬆", d:"应用内更新，签名校验与进度跟踪"},
    {n:"菜单栏托盘", e:"🟦", d:"显示窗口 / 防睡眠 / 开机启动 / 退出"},
    {n:"国际化", e:"🌐", d:"中英文双语，即时切换"},
  ]},
];

const tabsEl=document.getElementById('tabs');
const headEl=document.getElementById('head');
const gridEl=document.getElementById('grid');
const toast=document.getElementById('toast');
let cur='launch';

TABS.forEach(t=>{
  const b=document.createElement('div');
  b.className='tab'+(t.id===cur?' active':'');
  b.dataset.id=t.id;
  b.innerHTML=`${t.n}${t.items.length?`<span class="cnt">${t.items.length}</span>`:''}`;
  b.onclick=()=>show(t.id);
  tabsEl.appendChild(b);
});

function show(id){
  cur=id;
  const t=TABS.find(x=>x.id===id);
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x.dataset.id===id));
  headEl.innerHTML=`<h1>${t.n} <span class="en">${t.en}</span></h1><div class="desc">${t.desc}</div>`;
  gridEl.innerHTML='';
  t.items.forEach(it=>{
    const d=document.createElement('div');
    d.className='tile';
    d.innerHTML=`<div class="e">${it.e}</div><div class="n">${it.n}</div><div class="d">${it.d}</div>${it.badge?`<span class="badge">${it.badge}</span>`:''}<div class="go">进入 →</div>`;
    d.onclick=()=>{toast.textContent='进入 → '+it.n;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100);};
    gridEl.appendChild(d);
  });
}
show('launch');
</script>
</body>
</html>
