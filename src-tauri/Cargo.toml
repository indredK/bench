[package]
name = "bench"
version = "1.0.0"
edition = "2021"

[lib]
name = "bench_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sysinfo = "0.37.2"
walkdir = "2"
chrono = "0.4"
dirs-next = "2"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
base64 = "0.22"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
