# cargo-deny 配置 — 安全扫描
#
# 运行: cargo deny check
# CI:  .github/workflows/security.yml

[graph]
all-features = true

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
# Transitive unmaintained GTK3 / unic-* crates are informational only in CI.
unmaintained = "none"
unsound = "workspace"
ignore = [
  # quick-xml 0.39.4 in wayland-scanner (build-time proc-macro, no runtime risk).
  # cargo-audit mirrors these in .cargo/audit.toml (it does not read deny.toml):
  "RUSTSEC-2026-0194",
  "RUSTSEC-2026-0195",
  # num-bigint 0.4.7 in keyring→secret-service→num (transitive, no direct dep):
  { crate = "num-bigint@0.4.7", reason = "transitive dep via keyring, no semver-compatible replacement published yet" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "Zlib",
  "Unicode-3.0",
  "MPL-2.0",
  "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
