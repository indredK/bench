name: CI & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true
  # Default to installable ad-hoc/unsigned OS packages. Set the repository
  # variable to "signed" after Apple/Windows certificates are available.
  BENCH_OS_SIGNING_MODE: ${{ vars.BENCH_OS_SIGNING_MODE || 'unsigned' }}

permissions:
  contents: write
  actions: read
  pull-requests: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check repository formatting
        run: pnpm run format:check

      - name: Run frontend static guards
        run: pnpm run lint:fe

      - name: Check Rust crate declarations
        run: node scripts/quality/check-rust-crates.mjs

      - name: Check Rust formatting
        run: pnpm run format:be

      - name: Run Rust clippy
        run: pnpm run clippy:be

      - name: Run frontend tests
        run: pnpm run test:fe

      - name: Run Rust tests
        run: pnpm run test:be

      - name: Run Tauri build smoke test (no bundle)
        run: pnpm tauri build --debug --no-bundle

  release-build:
    name: Release Build (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release signing mode
        shell: bash
        run: |
          case "$BENCH_OS_SIGNING_MODE" in
            unsigned|signed) ;;
            *)
              echo "::error::BENCH_OS_SIGNING_MODE must be 'unsigned' or 'signed', got '$BENCH_OS_SIGNING_MODE'."
              exit 1
              ;;
          esac

      - name: Import Apple Developer ID certificate
        if: runner.os == 'macOS' && env.BENCH_OS_SIGNING_MODE == 'signed'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::error::APPLE_CERTIFICATE and APPLE_CERTIFICATE_PASSWORD are required for macOS releases."
            exit 1
          fi
          keychain_path="$RUNNER_TEMP/bench-release.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          certificate_path="$RUNNER_TEMP/bench-release.p12"
          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          echo "BENCH_RELEASE_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Import Windows Authenticode certificate
        if: runner.os == 'Windows' && env.BENCH_OS_SIGNING_MODE == 'signed'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD are required for Windows releases."
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "bench-release.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $certificate -or -not $certificate.Thumbprint) {
            throw "Windows release certificate import did not return a thumbprint."
          }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for release tags."
            exit 1
          fi
          if [ "${{ runner.os }}" = "macOS" ]; then
            if [ "$BENCH_OS_SIGNING_MODE" = "signed" ]; then
              apple_signing_identity="${{ secrets.APPLE_SIGNING_IDENTITY }}"
              apple_id="${{ secrets.APPLE_ID }}"
              apple_password="${{ secrets.APPLE_PASSWORD }}"
              apple_team_id="${{ secrets.APPLE_TEAM_ID }}"
              if [ -z "$apple_signing_identity" ] || [ -z "$apple_id" ] || [ -z "$apple_password" ] || [ -z "$apple_team_id" ]; then
                echo "::error::APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID are required in signed mode."
                exit 1
              fi
              release_config="{\"bundle\":{\"macOS\":{\"signingIdentity\":\"$apple_signing_identity\"}}}"
              pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg --config "$release_config"
            else
              echo "::warning::Building an ad-hoc signed macOS package. Users must explicitly trust Bench in macOS."
              # Do not inject empty APPLE_SIGNING_IDENTITY — it overrides tauri.conf.json ad-hoc "-".
              release_config='{"bundle":{"macOS":{"signingIdentity":"-"}}}'
              pnpm tauri build --target ${{ matrix.target }} --bundles app,dmg --config "$release_config"
            fi
          elif [ "${{ runner.os }}" = "Windows" ]; then
            if [ "$BENCH_OS_SIGNING_MODE" = "signed" ]; then
              if [ -z "$WINDOWS_CERTIFICATE_THUMBPRINT" ] || [ -z "$WINDOWS_TIMESTAMP_URL" ]; then
                echo "::error::Windows certificate thumbprint and WINDOWS_TIMESTAMP_URL are required in signed mode."
                exit 1
              fi
              release_config="{\"bundle\":{\"windows\":{\"certificateThumbprint\":\"$WINDOWS_CERTIFICATE_THUMBPRINT\",\"digestAlgorithm\":\"sha256\",\"timestampUrl\":\"$WINDOWS_TIMESTAMP_URL\"}}}"
              pnpm tauri build --target ${{ matrix.target }} --bundles msi,nsis --config "$release_config"
            else
              echo "::warning::Building unsigned Windows packages. Windows may show an unknown publisher warning."
              pnpm tauri build --target ${{ matrix.target }} --bundles msi,nsis
            fi
          else
            echo "::error::Release builds only support macOS and Windows runners."
            exit 1
          fi

      - name: Verify macOS code signing and notarization
        if: runner.os == 'macOS' && env.BENCH_OS_SIGNING_MODE == 'signed'
        run: |
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          app_count="$(find "$bundle_dir/macos" -maxdepth 1 -type d -name "*.app" | wc -l | tr -d ' ')"
          dmg_count="$(find "$bundle_dir/dmg" -maxdepth 1 -type f -name "*.dmg" | wc -l | tr -d ' ')"
          if [ "$app_count" -ne 1 ] || [ "$dmg_count" -ne 1 ]; then
            echo "::error::Expected one signed app and one notarized DMG for ${{ matrix.target }}."
            exit 1
          fi
          app_path="$(find "$bundle_dir/macos" -maxdepth 1 -type d -name "*.app" -print -quit)"
          dmg_path="$(find "$bundle_dir/dmg" -maxdepth 1 -type f -name "*.dmg" -print -quit)"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          xcrun stapler validate "$app_path"
          xcrun stapler validate "$dmg_path"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg_path"

      - name: Verify Windows Authenticode signatures
        if: runner.os == 'Windows' && env.BENCH_OS_SIGNING_MODE == 'signed'
        shell: pwsh
        run: |
          $bundleRoot = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $files = @(
            Get-Item "src-tauri/target/${{ matrix.target }}/release/bench.exe"
            Get-ChildItem -Path "$bundleRoot/msi" -File -Filter *.msi
            Get-ChildItem -Path "$bundleRoot/nsis" -File -Filter *.exe
          )
          if ($files.Count -ne 3) {
            throw "Expected signed application, MSI, and NSIS files; found $($files.Count)."
          }
          foreach ($file in $files) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne "Valid") {
              throw "Authenticode signature is not valid for $($file.FullName): $($signature.Status)"
            }
          }

      - name: Collect macOS bundle and updater artifacts
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          case "${{ matrix.target }}" in
            aarch64-apple-darwin) updater_platform="darwin-aarch64" ;;
            x86_64-apple-darwin) updater_platform="darwin-x86_64" ;;
            *) echo "Unsupported macOS updater target: ${{ matrix.target }}" && exit 1 ;;
          esac
          bundle_dir="src-tauri/target/${{ matrix.target }}/release/bundle"
          dmg_count="$(find "$bundle_dir/dmg" -maxdepth 1 -type f -name "*.dmg" | wc -l | tr -d ' ')"
          updater_count="$(find "$bundle_dir" -type f -name "*.app.tar.gz" | wc -l | tr -d ' ')"
          if [ "$dmg_count" -ne 1 ] || [ "$updater_count" -ne 1 ]; then
            echo "::error::Expected exactly one DMG and one updater bundle for ${{ matrix.target }}; found DMG=$dmg_count updater=$updater_count."
            exit 1
          fi
          dmg_file="$(find "$bundle_dir/dmg" -maxdepth 1 -type f -name "*.dmg" -print -quit)"
          updater_file="$(find "$bundle_dir" -type f -name "*.app.tar.gz" -print -quit)"
          if [ ! -s "$dmg_file" ] || [ ! -s "$updater_file" ] || [ ! -s "${updater_file}.sig" ]; then
            echo "::error::macOS installer, updater, or updater signature is missing/empty for ${{ matrix.target }}."
            exit 1
          fi
          cp "$dmg_file" "artifacts/${updater_platform}-$(basename "$dmg_file")"
          updater_name="${updater_platform}-$(basename "$updater_file")"
          updater_sig_name="${updater_name}.sig"
          cp "$updater_file" "artifacts/$updater_name"
          cp "${updater_file}.sig" "artifacts/$updater_sig_name"
          node scripts/release/write-updater-manifest.mjs \
            --output-dir artifacts \
            --target "${{ matrix.target }}" \
            --platform "$updater_platform" \
            --file "artifacts/$updater_name" \
            --signature "artifacts/$updater_sig_name"

      - name: Collect Windows bundle and updater artifacts
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $bundleRoot = "src-tauri/target/${{ matrix.target }}/release/bundle"
          $msi = @(Get-ChildItem -Path "$bundleRoot/msi" -File -Filter *.msi)
          $nsis = @(Get-ChildItem -Path "$bundleRoot/nsis" -File -Filter *.exe)
          if ($msi.Count -ne 1 -or $nsis.Count -ne 1) {
            throw "Expected exactly one MSI and one NSIS installer; found MSI=$($msi.Count) NSIS=$($nsis.Count)."
          }
          $sigPath = "$($nsis[0].FullName).sig"
          if (-not (Test-Path $sigPath) -or (Get-Item $sigPath).Length -eq 0) {
            throw "Windows NSIS updater signature is missing or empty: $sigPath"
          }
          $msiName = "windows-x86_64-$($msi[0].Name)"
          $updaterName = "windows-x86_64-$($nsis[0].Name)"
          Copy-Item $msi[0].FullName -Destination "artifacts/$msiName"
          Copy-Item $nsis[0].FullName -Destination "artifacts/$updaterName"
          Copy-Item $sigPath -Destination "artifacts/$updaterName.sig"
          node scripts/release/write-updater-manifest.mjs `
            --output-dir artifacts `
            --target "${{ matrix.target }}" `
            --platform "windows-x86_64" `
            --file "artifacts/$updaterName" `
            --signature "artifacts/$updaterName.sig"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.target }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

      - name: Remove temporary Apple release keychain
        if: always() && runner.os == 'macOS'
        run: |
          if [ -n "${BENCH_RELEASE_KEYCHAIN:-}" ]; then
            security delete-keychain "$BENCH_RELEASE_KEYCHAIN"
          fi

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Write OS signing notice
        shell: bash
        run: |
          case "$BENCH_OS_SIGNING_MODE" in
            unsigned)
              cat > release-assets/OS-SIGNING-NOTICE.txt <<'EOF'
          Bench packages in this release are not signed with Apple Developer ID or Windows Authenticode.

          macOS uses an ad-hoc signature. Open Bench with Control-click > Open, or allow it from
          System Settings > Privacy & Security after confirming the SHA256SUMS checksum.

          Windows may display an unknown publisher warning. Confirm the release source and
          SHA256SUMS checksum before continuing.

          Application updater bundles remain signed with the separate Tauri updater key.
          EOF
              ;;
            signed)
              printf '%s\n' 'Bench packages in this release use OS code signing and a separate Tauri updater signature.' > release-assets/OS-SIGNING-NOTICE.txt
              ;;
            *)
              echo "::error::Unsupported BENCH_OS_SIGNING_MODE: $BENCH_OS_SIGNING_MODE"
              exit 1
              ;;
          esac

      - name: List release assets
        run: ls -la release-assets/

      - name: Verify required release assets
        run: node scripts/release/verify-release-assets.mjs release-assets

      - name: Read release metadata without mutating GitHub
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release view "${{ github.ref_name }}" --json body,publishedAt > release-metadata.json
          else
            published_at="$(git show -s --format=%cI "${{ github.ref_name }}")"
            jq -n --arg publishedAt "$published_at" '{body: "", publishedAt: $publishedAt}' > release-metadata.json
          fi

      - name: Generate latest.json
        run: node scripts/release/generate-updater-json.mjs --assets-dir release-assets --tag "${{ github.ref_name }}" --repo "${{ github.repository }}" --release-metadata release-metadata.json

      - name: Verify updater signatures
        run: |
          updater_pubkey="$(node -e "const fs=require('fs'); const conf=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); process.stdout.write(conf.plugins.updater.pubkey);")"
          cargo run --manifest-path src-tauri/Cargo.toml --bin verify_updater_manifest -- \
            --latest-json release-assets/latest.json \
            --assets-dir release-assets \
            --pubkey "$updater_pubkey"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          shopt -s nullglob
          rm -f release-assets/updater-manifest-*.json
          (
            cd release-assets
            for file in *; do
              if [ -f "$file" ] && [ "$file" != "SHA256SUMS" ]; then
                shasum -a 256 "$file"
              fi
            done > SHA256SUMS
            test -s SHA256SUMS
            shasum -a 256 -c SHA256SUMS
          )
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" release-assets/* --clobber
          else
            gh release create "${{ github.ref_name }}" \
              --title "Bench ${{ github.ref_name }}" \
              --generate-notes \
              release-assets/*
          fi
