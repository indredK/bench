name: CI & Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

permissions:
  contents: write
  actions: read

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
          - ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:fe

      - name: Run Rust tests
        run: npm run test:be

      - name: Run frontend build
        run: npm run build:fe

      - name: Run Tauri build smoke test
        run: npm run build:debug

  release-build:
    name: Release Build (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/')
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Collect macOS bundle (dmg)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ || true
          find src-tauri/target -name "*.dmg" -exec cp {} artifacts/ \; 2>/dev/null || true

      - name: Collect Windows bundle (msi/exe)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          Get-ChildItem -Path src-tauri/target -Recurse -Include *.msi,*.exe | Where-Object { $_.FullName -match "bundle" } | Copy-Item -Destination artifacts/ -ErrorAction SilentlyContinue

      - name: Collect Linux bundle (deb/AppImage)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          find src-tauri/target -name "*.deb" -o -name "*.AppImage" | while read f; do cp "$f" artifacts/; done 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: bundle-${{ matrix.target }}
          path: artifacts/
          retention-days: 7

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: release-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -la release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          gh release create "${{ github.ref_name }}" \
            --title "Port Manager ${{ github.ref_name }}" \
            --generate-notes \
            release-assets/*
