name: Security Scan

on:
  schedule:
    # 每周一 UTC 02:00（北京时间 10:00）
    - cron: "0 2 * * 1"
  push:
    branches:
      - main
  pull_request:
    paths:
      - "src-tauri/Cargo.toml"
      - "src-tauri/Cargo.lock"
      - "src-tauri/deny.toml"
      - "src-tauri/.cargo/audit.toml"
      - ".github/workflows/security.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Cargo Audit + Deny
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo audit
        working-directory: src-tauri
        run: cargo audit

      - name: Run cargo deny
        working-directory: src-tauri
        run: cargo deny check

      - name: Create issue on failure
        if: failure() && github.event_name == 'schedule'
        run: |
          gh issue create \
            --title "Security: cargo audit / deny 发现问题" \
            --label security \
            --body "安全扫描在定时检查中发现问题。

          查看: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}
