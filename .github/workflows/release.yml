name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v1.0.1)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Find CI build run for tag
        id: find-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Searching for CI build runs triggered by tag: ${{ inputs.tag }}"

          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow ci-build.yml \
            --branch ${{ inputs.tag }} \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')

          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "❌ No successful CI build found for tag ${{ inputs.tag }}"
            echo "   Please push the tag first and wait for ci-build.yml to complete."
            exit 1
          fi

          echo "✅ Found CI build run: $RUN_ID"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Download all platform artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Downloading artifacts from run ${{ steps.find-run.outputs.run_id }}"
          gh run download ${{ steps.find-run.outputs.run_id }} \
            --repo ${{ github.repository }} \
            --dir artifacts-resolved

          echo "=== Downloaded artifacts ==="
          find artifacts-resolved -type f | sort

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-assets
          find artifacts-resolved -type f -not -name "*.md" | while read f; do
            cp "$f" release-assets/ 2>/dev/null || true
          done
          echo "=== Release assets ==="
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: "Port Manager ${{ inputs.tag }}"
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ github.token }}