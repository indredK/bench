name: Cache Cleanup

on:
  schedule:
    # 每周一 UTC 02:00 运行
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    name: Delete stale GitHub Actions caches
    runs-on: macos-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Delete caches older than 7 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          CUTOFF_MS=$(node -e 'process.stdout.write(String(Date.now() - 7 * 24 * 60 * 60 * 1000))')

          gh api "repos/${REPO}/actions/caches" --paginate \
            --jq '.actions_caches[] | select(.last_accessed_at != null) | [.id, .last_accessed_at, .key] | @tsv' \
          | while IFS=$'\t' read -r id accessed_at key; do
              accessed_ms=$(node -e 'const value = Date.parse(process.argv[1]); process.stdout.write(String(Number.isNaN(value) ? 0 : value))' "$accessed_at")
              if [ "$accessed_ms" -lt "$CUTOFF_MS" ]; then
                echo "Deleting cache: $key (last accessed: $accessed_at)"
                gh api --method DELETE "repos/${REPO}/actions/caches/${id}" || true
              fi
            done

          echo "Cache cleanup complete."
